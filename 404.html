<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lỗi 404 - Không tìm thấy trang</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #030712;
      --surface: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.15);
      --accent-secondary: #818cf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: 
        radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(129, 140, 248, 0.12) 0%, transparent 40%),
        #030712;
      color: var(--text);
      font-family: "Be Vietnam Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
    }

    .card {
      width: min(480px, 100%);
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      text-align: center;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .error-code {
      font-size: 80px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
      letter-spacing: -2px;
      filter: drop-shadow(0 0 20px var(--accent-glow));
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (min-width: 400px) {
      .actions {
        flex-direction: row;
        justify-content: center;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      outline: none;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      color: #030712;
      box-shadow: 0 4px 20px rgba(56, 189, 248, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(56, 189, 248, 0.4);
      filter: brightness(1.1);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    /* Spinner animation for redirect state */
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(56, 189, 248, 0.1);
      border-left-color: var(--accent);
      border-radius: 50%;
      margin: 24px auto 32px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <link rel="stylesheet" href="/assets/not-found.css">
</head>
<body>
  <div class="card">
    <!-- Trạng thái Đang chuyển hướng -->
    <div id="redirect-state" style="display: none;">
      <div class="spinner"></div>
      <h1>Đang chuyển hướng...</h1>
      <p>Chúng tôi đang đưa bạn đến địa chỉ chính xác. Vui lòng đợi trong giây lát.</p>
    </div>

    <!-- Trạng thái Lỗi 404 thực tế -->
    <div id="error-state">
      <div class="error-code">404</div>
      <h1>Không tìm thấy trang</h1>
      <p>Đường liên kết không tồn tại hoặc đã bị thay đổi. Nếu bạn vừa cập nhật trang web, vui lòng thử tải lại trang bên dưới.</p>
      <div class="actions">
        <a href="/" class="btn btn-primary">Về trang chủ</a>
        <button id="btn-reload" class="btn btn-secondary">Tải lại trang</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const path = window.location.pathname;
      const lowerPath = path.toLowerCase();

      function showRedirectState() {
        document.getElementById("redirect-state").style.display = "block";
        document.getElementById("error-state").style.display = "none";
        document.title = "Đang chuyển hướng...";
      }

      // Danh mục các thư mục chính cần chuẩn hóa chữ hoa/thường
      const canonicalFolders = {
        "padcodeai": "PadCodeAI",
        "lunarv": "LunarV",
        "phtv": "PHTV",
        "padnotesai": "PadNotesAI",
        "aipadnotes": "PadNotesAI",
        "mynasmanager": "MyNASManager",
        "lunarblock": "LunarBlock"
      };

      // Tách các phân đoạn của đường dẫn
      const segments = path.split("/");
      // segments[0] luôn rỗng vì path bắt đầu bằng "/"
      if (segments.length > 1) {
        const firstFolderLower = segments[1].toLowerCase();
        const canonicalFolder = canonicalFolders[firstFolderLower];

        if (canonicalFolder) {
          let needsRedirect = segments[1] !== canonicalFolder;

          // Nếu chỉ truy cập thư mục chính mà thiếu dấu gạch chéo cuối (/), bắt buộc thêm vào
          if (segments.length === 2 && !path.endsWith("/")) {
            needsRedirect = true;
          }

          let restSegments = segments.slice(2);
          
          // Chuẩn hóa tên file cụ thể của PadCodeAI để tránh lỗi hoa/thường
          if (canonicalFolder === "PadCodeAI" && restSegments.length > 0) {
            const fileNameLower = restSegments[0].toLowerCase();
            if (fileNameLower === "privacy" || fileNameLower === "privacy.html") {
              restSegments[0] = "privacy.html";
              if (segments[2] !== "privacy.html") needsRedirect = true;
            } else if (fileNameLower === "terms" || fileNameLower === "terms.html") {
              restSegments[0] = "terms.html";
              if (segments[2] !== "terms.html") needsRedirect = true;
            } else if (fileNameLower === "index.html") {
              restSegments[0] = "";
              needsRedirect = true;
            }
          }

          if (needsRedirect) {
            const newPath = "/" + canonicalFolder + "/" + restSegments.join("/");
            const cleanPath = newPath.replace(/\/+/g, "/").replace(/\/$/, "/");
            showRedirectState();
            window.location.replace(cleanPath);
            return;
          }
        }
      }

      // Các trường hợp chuyển hướng đặc biệt khác (đường dẫn cũ)
      const specialRedirects = {
        "/products/lunarv": "/LunarV/",
        "/products/lunarv/": "/LunarV/",
        "/products/lunarv/index.html": "/LunarV/"
      };

      const target = specialRedirects[lowerPath.replace(/\/$/, "")];
      if (target && path !== target) {
        showRedirectState();
        window.location.replace(target);
        return;
      }

      // Xử lý nút tải lại trang và xóa cache trình duyệt (bằng cách thêm tham số timestamp ngẫu nhiên)
      document.getElementById("btn-reload").addEventListener("click", function() {
        const cacheBustUrl = window.location.origin + window.location.pathname + "?t=" + Date.now() + window.location.hash;
        showRedirectState();
        window.location.replace(cacheBustUrl);
      });
    })();
  </script>
</body>
</html>
