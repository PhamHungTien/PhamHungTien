<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang chuyển hướng...</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --surface: rgba(15, 23, 42, 0.9);
      --border: rgba(148, 163, 184, 0.24);
      --text: #e5eefb;
      --muted: #94a3b8;
      --accent: #82c7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(130, 199, 235, 0.18), transparent 28%),
        linear-gradient(180deg, #111827 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Be Vietnam Pro", "Noto Sans", "Segoe UI", sans-serif;
    }

    .card {
      width: min(520px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.5rem, 4vw, 2rem);
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Trang này đang được chuyển sang địa chỉ đúng.</h1>
    <p id="message">Nếu trình duyệt chưa tự mở trang đúng, bạn có thể quay lại <a href="/">trang chính</a>.</p>
  </div>

  <script>
    (function () {
      const path = window.location.pathname;
      const redirects = {
        "/products/lunarv": "/LunarV/",
        "/products/lunarv/": "/LunarV/",
        "/products/lunarv/index.html": "/LunarV/",
        "/lunarv": "/LunarV/",
        "/lunarv/": "/LunarV/",
        "/lunarv/index.html": "/LunarV/"
      };

      const target = redirects[path];
      if (target) {
        window.location.replace(target);
      }
    })();
  </script>
</body>
</html>
