    <!-- FAQ Schema for Rich Snippets -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "PHTV là gì?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PHTV (Precision Hybrid Typing Vietnamese) là bộ gõ tiếng Việt miễn phí, mã nguồn mở được phát triển 100% bằng Swift dành riêng cho macOS 14 trở lên (Sonoma, Sequoia, Tahoe,...). Ứng dụng hỗ trợ Telex, VNI, gõ tắt thông minh, kiểm tra chính tả và Emoji Picker, hoàn toàn offline và không thu thập dữ liệu người dùng."
          }
        },
        {
          "@type": "Question",
          "name": "PHTV có miễn phí không?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Có, PHTV hoàn toàn miễn phí 100% và là mã nguồn mở (MIT License). Bạn có thể tải xuống, sử dụng và đóng góp phát triển mà không mất bất kỳ chi phí nào."
          }
        },
        {
          "@type": "Question",
          "name": "PHTV hỗ trợ phiên bản macOS nào?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PHTV yêu cầu macOS 14.0 (Sonoma) trở lên. Ứng dụng hoạt động tốt trên macOS Sonoma, Sequoia, Tahoe và các phiên bản mới hơn."
          }
        },
        {
          "@type": "Question",
          "name": "PHTV có an toàn và bảo mật không?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hoàn toàn an toàn. PHTV hoạt động 100% offline, không kết nối internet, không thu thập dữ liệu cá nhân hay lịch sử gõ của bạn. Mọi dữ liệu được lưu trữ cục bộ trên máy của bạn."
          }
        },
        {
          "@type": "Question",
          "name": "PHTV hỗ trợ những kiểu gõ nào?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PHTV hỗ trợ Telex và VNI - hai kiểu gõ phổ biến nhất tại Việt Nam. Ngoài ra còn có tính năng gõ tắt Macro thông minh giúp tiết kiệm thời gian."
          }
        },
        {
          "@type": "Question",
          "name": "Làm thế nào để cài đặt PHTV?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tải đúng file .dmg cho Apple Silicon hoặc Intel từ GitHub Releases, mở file và kéo PHTV vào thư mục Applications. Mở ứng dụng lần đầu tiên, vào System Settings > Keyboard > Input Sources để thêm PHTV vào danh sách bộ gõ."
          }
        }
      ]
    }
    </script>
