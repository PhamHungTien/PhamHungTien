name: Deploy PHTV Website

# Publishes the built site to the gh-pages branch, which GitHub Pages serves.
#
# Pages used to be configured to serve the repository root, so it published the
# unbuilt index.html and the TypeScript sources while ignoring this workflow's
# output. Building into a branch keeps exactly one publishing path, and lets
# scripts/deploy-local.sh push the same tree from a laptop when Actions is down.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            PHTV/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install PHTV dependencies
        working-directory: ./PHTV
        run: npm ci

      - name: Build root React site
        run: npm run build

      - name: Build PHTV React app
        working-directory: ./PHTV
        run: npm run build

      - name: Assemble _site
        run: ./scripts/build-site.sh _site

      - name: Verify SEO invariants
        run: ./scripts/verify-site.sh _site

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd _site
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy: ${GITHUB_SHA::7}"
          # gh-pages holds generated output only; each deploy replaces it wholesale.
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
