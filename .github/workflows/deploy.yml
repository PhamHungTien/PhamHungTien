name: Deploy PHTV Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            PHTV/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install PHTV dependencies
        working-directory: ./PHTV
        run: npm ci

      - name: Build root React site
        run: npm run build

      - name: Build PHTV React app
        working-directory: ./PHTV
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'PLACEHOLDER_API_KEY' }}

      - name: Prepare deployment
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r dist/. _site/
          # Copy root level SEO and configuration files
          cp 404.html _site/ || true
          cp CNAME _site/ || true
          cp robots.txt _site/ || true
          cp sitemap.xml _site/ || true
          cp ads.txt _site/ || true
          cp assets/phtv-icon.webp _site/icon.webp || true
          cp _redirects _site/ || true
          cp .htaccess _site/ || true
          cp .nojekyll _site/ || true
          # Copy shared legacy assets used by legal/static pages without overwriting Vite assets
          mkdir -p _site/assets
          cp -r assets/. _site/assets/
          # Copy React route shells plus legal/static assets for product folders
          for app in LunarV LunarBlock PadCodeAI PadNotesAI MyNASManager; do
            mkdir -p "_site/$app"
            cp dist/index.html "_site/$app/index.html"
            cp "$app/privacy.html" "_site/$app/privacy.html" || true
            cp "$app/terms.html" "_site/$app/terms.html" || true
            cp -r "$app/assets" "_site/$app/assets" || true
          done
          mkdir -p _site/mynasmanager
          cp dist/index.html _site/mynasmanager/index.html
          cp MyNASManager/privacy.html _site/mynasmanager/privacy.html || true
          cp MyNASManager/terms.html _site/mynasmanager/terms.html || true
          cp -r MyNASManager/assets _site/mynasmanager/assets || true
          # Copy PHTV app to its subdirectory
          cp -r PHTV/dist _site/PHTV

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
          name: github-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
